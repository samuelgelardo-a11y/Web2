<!DOCTYPE html>
<html>
<head>
<title>Daftar Peralatan Yang Dibeli</title>
<style type="text/css">
    body { font-size: 14pt; }
    table { font-size: 25pt; }
</style>
</head>
<body>
<center>
    <font face="comic sans serif" size="5" color="blue">Contoh Perhitungan Peralatan (Versi GitHub)</font>
    <div id="tempat-tabel"></div>
</center>

<script>
    // Inisiasi variable
    let brg1 = "Buku", brg2 = "Mouse", brg3 = "FlashDisk", brg4 = "Pulpen";
    let harga1 = 17500, harga2 = 30000, harga3 = 70000, harga4 = 22300;
    let jmlbrg1 = 2, jmlbrg2 = 5, jmlbrg3 = 1, jmlbrg4 = 3;

    // Total harga per jenis
    let th1 = jmlbrg1 * harga1;
    let th2 = jmlbrg2 * harga2;
    let th3 = jmlbrg3 * harga3;
    let th4 = jmlbrg4 * harga4;

    // Grand total dan Diskon
    let tharga = th1 + th2 + th3 + th4;
    let diskon = 5;
    let tdiskon = (diskon * tharga) / 100;
    let tdibayar = tharga - tdiskon;

    // Membuat tabel HTML dan memasukkan hasil hitungan
    let tabelHTML = `
    <table border="1" cellspacing="0" cellpadding="3">
        <tr>
            <td colspan="4" align="center" valign="middle"><b>Daftar Pemesanan Peralatan Kantor</b></td>
        </tr>
        <tr>
            <td><b>Nama Peralatan</b></td><td><b>Jumlah</b></td><td><b>Harga Satuan</b></td><td><b>Jumlah Harga</b></td>
        </tr>
        <tr>
            <td align="left">${brg1}</td><td align="right">${jmlbrg1}</td><td align="right">${harga1}</td><td align="right">${th1}</td>
        </tr>
        <tr>
            <td align="left">${brg2}</td><td align="right">${jmlbrg2}</td><td align="right">${harga2}</td><td align="right">${th2}</td>
        </tr>
        <tr>
            <td align="left">${brg3}</td><td align="right">${jmlbrg3}</td><td align="right">${harga3}</td><td align="right">${th3}</td>
        </tr>
        <tr>
            <td align="left">${brg4}</td><td align="right">${jmlbrg4}</td><td align="right">${harga4}</td><td align="right">${th4}</td>
        </tr>
        <tr>
            <td colspan="3" align="right">Total Harga</td><td align="right">${tharga}</td>
        </tr>
        <tr>
            <td colspan="3" align="right">Diskon ( ${diskon} % )</td><td align="right">${tdiskon}</td>
        </tr>
        <tr>
            <td colspan="3" align="right">Jumlah harus dibayar</td><td align="right">${tdibayar}</td>
        </tr>
    </table>
    `;

    // Menampilkan tabel ke layar
    document.getElementById('tempat-tabel').innerHTML = tabelHTML;
</script>
</body>
</html>
